name: Update Steam Deals

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Fetch deals
        env:
          ITAD_API_KEY: ${{ secrets.ITAD_API_KEY }}
        run: python scripts/fetch_deals.py

      - name: Commit updated data
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add docs/data/deals.json docs/data/deals.backup.json
          if ! git diff --staged --quiet; then
            git commit -m "chore: update deals $(date -u +%Y-%m-%dT%H:%M:%SZ) [skip ci]"
            git pull --rebase origin main
            git push
          fi
