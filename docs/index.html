<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <title>New S Deals | Steam 新史低</title>
  <link rel="stylesheet" href="assets/style.css?v=20260630b" />
</head>
<body>

<header class="site-header">
  <div class="header-inner">
    <div class="brand">
      <span class="brand-icon">🎮</span>
      <span class="brand-title" data-i18n="site_title">Steam 史低追踪</span>
    </div>
    <div class="header-controls">
      <div class="control-group">
        <label class="control-label" data-i18n="label_currency">货币</label>
        <div class="btn-group" id="currency-group">
          <button class="btn-toggle active" data-currency="USD">USD</button>
          <button class="btn-toggle" data-currency="CNY">CNY</button>
          <button class="btn-toggle" data-currency="MYR">MYR</button>
        </div>
      </div>
      <div class="control-group">
        <label class="control-label" data-i18n="label_sort">排序</label>
        <select id="sort-select" class="select-control">
          <option value="priority" data-i18n="sort_priority">优先级</option>
          <option value="cut" data-i18n="sort_cut">折扣</option>
          <option value="score" data-i18n="sort_score">好评率</option>
          <option value="price" data-i18n="sort_price">当前价格</option>
        </select>
      </div>
      <div class="control-group">
        <label class="control-label" data-i18n="label_filter">筛选</label>
        <div class="btn-group" id="filter-group">
          <button class="btn-toggle active" data-filter="all"   data-i18n="filter_all">全部</button>
          <button class="btn-toggle"        data-filter="atl"   data-i18n="filter_atl">史低</button>
          <button class="btn-toggle"        data-filter="aaa"   data-i18n="filter_aaa">大作</button>
        </div>
      </div>
      <button id="lang-toggle" class="btn-lang">EN</button>
    </div>
  </div>
  <div class="search-bar">
    <input id="search-input" type="search" placeholder="搜索游戏…" data-i18n-placeholder="search_placeholder" />
  </div>
</header>

<section id="featured-section" class="featured-section hidden">
  <div class="featured-inner">
    <div class="featured-header">
      <div class="featured-title-group">
        <span class="featured-icon">🔥</span>
        <div>
          <div class="featured-title" data-i18n="featured_title">知名大作 · 新史低</div>
          <div class="featured-subtitle" data-i18n="featured_subtitle">以下大作正在以历史最低价促销</div>
        </div>
      </div>
      <button id="copy-list-btn" class="btn-copy-list" data-i18n="copy_list">复制本期清单</button>
    </div>
    <div id="featured-grid" class="featured-grid"></div>
  </div>
</section>

<main>
  <div class="adv-filters">
    <div class="adv-filter-group">
      <label class="control-label" data-i18n="label_min_cut">最低折扣</label>
      <select id="min-cut-select" class="select-control">
        <option value="0" data-i18n="filter_any">不限</option>
        <option value="50">50%+</option>
        <option value="70">70%+</option>
        <option value="90">90%+</option>
      </select>
    </div>
    <div class="adv-filter-group">
      <label class="control-label" data-i18n="label_min_reviews">评价数</label>
      <select id="min-reviews-select" class="select-control">
        <option value="0" data-i18n="filter_any">不限</option>
        <option value="10000">1万+</option>
        <option value="50000">5万+</option>
        <option value="100000">10万+</option>
      </select>
    </div>
    <div class="adv-filter-group">
      <label class="control-label" data-i18n="label_tag">标签</label>
      <select id="tag-select" class="select-control">
        <option value="" data-i18n="filter_any">不限</option>
      </select>
    </div>
  </div>
  <div id="status-bar" class="status-bar hidden"></div>
  <div id="game-grid" class="game-grid"></div>
  <div id="load-more-wrap"></div>
  <div id="empty-state" class="empty-state hidden">
    <p data-i18n="no_deals">当前没有检测到 Steam 促销，请稍后再来。</p>
  </div>
</main>

<footer class="site-footer">
  <p>
    <span data-i18n="footer_data">数据来源</span>
    <a href="https://isthereanydeal.com" target="_blank" rel="noopener">IsThereAnyDeal</a>
    &nbsp;·&nbsp;
    <span id="updated-at"></span>
  </p>
</footer>

<!-- Modal -->
<div id="modal" class="modal hidden" role="dialog" aria-modal="true">
  <div class="modal-backdrop" id="modal-backdrop"></div>
  <div class="modal-box">
    <button class="modal-close" id="modal-close" aria-label="Close">✕</button>
    <div id="modal-content"></div>
  </div>
</div>

<script src="assets/app.js?v=20260630b"></script>
</body>
</html>
